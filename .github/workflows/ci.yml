name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check .

      - name: Isort check
        run: ruff check --select I .

      - name: Run tests
        run: pytest tests/ -v
        env:
          DATABASE_URL: postgresql+asyncpg://elevare:elevare_dev@localhost:5432/elevare_db
          DEBUG: "true"
          ENVIRONMENT: "test"
          SECRET_KEY: "test-secret-key"