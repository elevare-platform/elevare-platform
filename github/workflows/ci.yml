name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: elevare
          POSTGRES_PASSWORD: elevare_dev
          POSTGRES_DB: elevare_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U elevare -d elevare_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://elevare:elevare_dev@localhost:5432/elevare_db
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: "ci-test-secret-key-not-for-production"

      - name: Ruff lint
        run: ruff check .

      - name: Isort check
        run: ruff check --select I .

      - name: Run tests
        run: pytest tests/ -v
        env:
          DATABASE_URL: postgresql+asyncpg://elevare:elevare_dev@localhost:5432/elevare_db
          REDIS_URL: redis://localhost:6379/0
          DEBUG: "true"
          ENVIRONMENT: "test"
          SECRET_KEY: "ci-test-secret-key-not-for-production"
          EMAIL_STUB_MODE: "true"
          EMAIL_VERIFICATION_TOKEN_EXPIRY: "24"
          INVITE_EXPIRY: "3"
          COOKIE_SECURE: "false"
          ACCESS_TOKEN_EXPIRE_MINUTES: "30"
          REFRESH_TOKEN_EXPIRE_DAYS: "30"
          ALGORITHM: "HS256"