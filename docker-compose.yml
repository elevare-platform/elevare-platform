services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://elevare:elevare_dev@db:5432/elevare_db
      - DEBUG=true
      - ENVIRONMENT=development
      - SECRET_KEY=dev-secret-key-change-in-production
      - CORS_ORIGINS=["http://localhost:5173","https://elevare-platform.vercel.app","https://spritely-unbeautiful-bryn.ngrok-free.dev"]
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app  # live reload in dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: elevare
      POSTGRES_PASSWORD: elevare_dev
      POSTGRES_DB: elevare_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elevare -d elevare_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: